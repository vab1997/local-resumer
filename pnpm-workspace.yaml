packages:
  - apps/*

# Build-script policy for pnpm 11. esbuild (Vite) and sharp (WXT icon generation) need their
# install scripts; the node-only backends are intentionally not built — the extension runs in
# the browser, not Node.
allowBuilds:
  esbuild: true
  sharp: true
  onnxruntime-node: false
  protobufjs: false
  spawn-sync: false
minimumReleaseAgeExclude:
  - '@openrouter/ai-sdk-provider@3.0.0'
