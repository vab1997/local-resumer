openaiAccess:
  summary: ¿Modelo no habilitado? Revisá tu proyecto de OpenAI
  intro: 'Si las corridas fallan con "project does not have access to model", habilitá los modelos en tu proyecto de OpenAI:'
  step1: Abrí el panel de OpenAI en
  step2: Andá a "Projects" y después "Settings" (normalmente un ícono de engranaje).
  step3: En "Limits", asegurate de que gpt-4o-mini y gpt-5-mini estén activados.
  step4: Cerrá el panel de OpenAI y reintentá.

